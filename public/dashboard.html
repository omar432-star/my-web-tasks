<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Analytics dashboard</title>
    <script src="/ga-init.js"></script>
    <style>
      :root {
        --bg: #0f1419;
        --card: #1a2332;
        --text: #e7ecf3;
        --muted: #8b9cb3;
        --accent: #3d9cf5;
      }
      * {
        box-sizing: border-box;
      }
      body {
        font-family: system-ui, "Segoe UI", Tahoma, sans-serif;
        margin: 0;
        min-height: 100vh;
        background: var(--bg);
        color: var(--text);
        padding: 1.5rem;
      }
      h1 {
        font-size: 1.35rem;
        font-weight: 600;
        margin: 0 0 0.25rem;
      }
      .sub {
        color: var(--muted);
        font-size: 0.9rem;
        margin-bottom: 1.5rem;
      }
      .grid {
        display: grid;
        gap: 1rem;
        grid-template-columns: repeat(auto-fill, minmax(10rem, 1fr));
        max-width: 52rem;
        margin-bottom: 2rem;
      }
      .card {
        background: var(--card);
        border-radius: 10px;
        padding: 1rem 1.1rem;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      .card .label {
        color: var(--muted);
        font-size: 0.8rem;
        margin-bottom: 0.35rem;
      }
      .card .value {
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--accent);
      }
      table {
        width: 100%;
        max-width: 52rem;
        border-collapse: collapse;
        background: var(--card);
        border-radius: 10px;
        overflow: hidden;
        border: 1px solid rgba(255, 255, 255, 0.06);
      }
      th,
      td {
        padding: 0.65rem 1rem;
        text-align: left;
        border-bottom: 1px solid rgba(255, 255, 255, 0.06);
      }
      th {
        color: var(--muted);
        font-weight: 600;
        font-size: 0.8rem;
      }
      tr:last-child td {
        border-bottom: none;
      }
      .err {
        color: #f87171;
        max-width: 52rem;
      }
      .actions {
        margin-bottom: 1rem;
      }
      button {
        background: var(--accent);
        color: #0a0a0a;
        border: none;
        padding: 0.45rem 1rem;
        border-radius: 8px;
        font-weight: 600;
        cursor: pointer;
      }
      button:hover {
        filter: brightness(1.08);
      }
      a {
        color: var(--accent);
      }
    </style>
  </head>
  <body>
    <h1>Analytics dashboard</h1>
    <p class="sub">
      Unique visitors, sessions, page views, and average session duration (estimated from time spent before the tab is
      hidden).
    </p>
    <div class="actions">
      <button type="button" id="refresh">Refresh</button>
      <span style="margin-left: 1rem"><a href="/index.html">Demo site</a></span>
    </div>
    <div id="error" class="err" hidden></div>
    <div class="grid" id="grid"></div>
    <h2 style="font-size: 1rem; margin-bottom: 0.5rem">Top pages</h2>
    <table id="pages">
      <thead>
        <tr>
          <th>Path</th>
          <th>Views</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>

    <script>
      function formatDuration(sec) {
        if (sec < 60) return sec + "s";
        var m = Math.floor(sec / 60);
        var s = sec % 60;
        return m + "m " + (s ? s + "s" : "");
      }

      async function load() {
        var errEl = document.getElementById("error");
        errEl.hidden = true;
        try {
          var r = await fetch("/api/stats");
          if (!r.ok) throw new Error("HTTP " + r.status);
          var s = await r.json();

          document.getElementById("grid").innerHTML = [
            { label: "Unique visitors", value: s.uniqueVisitors },
            { label: "Sessions", value: s.sessions },
            { label: "Total page views", value: s.totalPageviews },
            { label: "Avg. session duration", value: formatDuration(s.avgSessionSeconds) },
            { label: "Stored events", value: s.eventCount },
          ]
            .map(function (x) {
              return (
                '<div class="card"><div class="label">' +
                x.label +
                '</div><div class="value">' +
                x.value +
                "</div></div>"
              );
            })
            .join("");

          var tb = document.querySelector("#pages tbody");
          tb.innerHTML = "";
          if (!s.pages || !s.pages.length) {
            var tr = document.createElement("tr");
            tr.innerHTML =
              '<td colspan="2">No data yet — open the demo site, then refresh.</td>';
            tb.appendChild(tr);
          } else {
            s.pages.forEach(function (p) {
              var tr = document.createElement("tr");
              tr.innerHTML = "<td>" + escapeHtml(p.path) + "</td><td>" + p.views + "</td>";
              tb.appendChild(tr);
            });
          }
        } catch (e) {
          errEl.textContent = "Could not load stats: " + e.message;
          errEl.hidden = false;
        }
      }

      function escapeHtml(str) {
        return String(str)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      document.getElementById("refresh").addEventListener("click", load);
      load();
      setInterval(load, 15000);
    </script>
  </body>
</html>
